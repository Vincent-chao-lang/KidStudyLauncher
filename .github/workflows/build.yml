name: Android CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 安装 Gradle
      run: |
        wget https://services.gradle.org/distributions/gradle-8.0-bin.zip
        unzip -q gradle-8.0-bin.zip
        echo "$GITHUB_WORKSPACE/gradle-8.0/bin" >> $GITHUB_PATH

    - name: 生成版本号
      id: version
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
        else
          VERSION="v1.0.0-$(date +'%Y%m%d-%H%M')-SNAPSHOT"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "version_name=$VERSION" >> $GITHUB_OUTPUT

    - name: 构建 Debug APK
      run: gradle --no-daemon --stacktrace assembleDebug

    - name: 构建 Release APK
      run: gradle --no-daemon --stacktrace assembleRelease

    - name: 上传 Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: 上传 Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30

    - name: 创建 GitHub Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release-unsigned.apk
        generate_release_notes: true
        name: ${{ steps.version.outputs.version_name }}
        body: |
          ## 🎉 KidStudyLauncher ${{ steps.version.outputs.version_name }}

          ### 📱 下载说明
          - `app-debug.apk` - 调试版本，推荐用于测试
          - `app-release-unsigned.apk` - 发布版本（未签名）

          ### ✨ 主要功能
          - 儿童桌面启动器
          - 应用白名单控制
          - AI 智能辅导
          - 家长密码保护
          - 沉浸式全屏模式

          ### 🔧 配置说明
          首次使用需要：
          1. 设置家长密码
          2. 勾选允许的应用
          3. 开启无障碍服务
          4. 配置豆包 AI API Key

          ---
          完整文档：https://github.com/Vincent-chao-lang/KidStudyLauncher
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 构建成功
      run: echo "🎉 Android 构建成功！"
