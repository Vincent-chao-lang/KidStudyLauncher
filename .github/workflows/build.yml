name: Android CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 安装 Gradle
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.0-bin.zip
        unzip -q gradle-8.0-bin.zip
        echo "$GITHUB_WORKSPACE/gradle-8.0/bin" >> $GITHUB_PATH

    - name: 构建Debug APK
      run: |
        gradle --no-daemon assembleDebug
        mkdir -p release
        cp app/build/outputs/apk/debug/app-debug.apk release/

    - name: 上传APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: release/app-debug.apk

    - name: 创建Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: release/app-debug.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
