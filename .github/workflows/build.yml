name: Android CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 设置 Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: 赋予 Gradle 执行权限
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        fi

    - name: 构建 Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: 上传 Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: 构建成功
      run: echo "🎉 Android 构建成功！"
